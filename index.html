    #info { font-size: 24px; text-shadow: 0 0 10px #0f0; }
    #skor { font-size: 18px; }

    <div id="skor">Skor: 0</div>

  <script type="module">
    import * as THREE from 'three';

    // 1. SETUP DASAR + BAYANGAN
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Langit biru
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // BAYANGAN ON
    document.body.appendChild(renderer.domElement);

    // 2. LAMPU + BAYANGAN
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 10, 5);
    light.castShadow = true;
    light.shadow.mapSize.width = 2048;
    light.shadow.mapSize.height = 2048;
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 3. BIKIN MOBIL FUNCTION
    function createCar(color, isPlayer = false) {
      const car = new THREE.Group();

      // Body mobil
      const bodyGeo = new THREE.BoxGeometry(2, 0.6, 1);
      const bodyMat = new THREE.MeshStandardMaterial({ color: color });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.4;
      body.castShadow = true;
      car.add(body);

      // Kabin
      const cabinGeo = new THREE.BoxGeometry(1, 0.5, 0.8);
      const cabinMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const cabin = new THREE.Mesh(cabinGeo, cabinMat);
      cabin.position.set(isPlayer ? -0.2 : 0.2, 0.95, 0);
      cabin.castShadow = true;
